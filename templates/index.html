<!DOCTYPE html>
<html>
<head>
    <title>AI PPT Generator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            text-align: center;
            padding-top: 80px;
            color: white;
        }

        input, select {
            padding: 12px;
            margin: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            background: #00c6ff;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🚀 AI PPT Generator</h1>

<form action="/generate">

    <input type="text" name="topic" placeholder="Topic" required><br>

    <select name="theme">
        <option value="navy">Navy</option>
        <option value="dark">Dark</option>
        <option value="green">Green</option>
        <option value="purple">Purple</option>
    </select><br>

    <input type="number" name="slides" placeholder="Slides"><br>

    <input type="text" name="extra" placeholder="Extra instructions"><br>

    <button type="submit">Generate PPT</button>

</form>

</body>
</html>
